<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Calculator</title>
</head>
<body>
    <div class="flex-container">
        <div class="title"></div>
        <div class="content">
            <div class="calculator">
                <div class="screen">0</div>
                <div class="buttons">
                    <div class="row-one">
                        <button class="clear">AC</button>
                        <button class="negate">+/-</button>
                        <button class="percent">%</button>
                        <button class="operator">/</button>
                    </div>
                    <div class="row-two">
                        <button class="number">7</button>
                        <button class="number">8</button>
                        <button class="number">9</button>
                        <button class="operator">x</button>
                    </div>
                    <div class="row-three">
                        <button class="number">4</button>
                        <button class="number">5</button>
                        <button class="number">6</button>
                        <button class="operator">-</button>
                    </div>
                    <div class="row-four">
                        <button class="number">1</button>
                        <button class="number">2</button>
                        <button class="number">3</button>
                        <button class="operator">+</button>
                    </div>
                    <div class="row-five">
                        <button class="number" style="flex-grow: 2.05;">0</button>
                        <button class="decimal">.</button>
                        <button class="equals">=</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer">
            <div class="text">Copyright © 2022 Dustin Yochim</div> 
            <div class="github"><a target="_blank" href="https://github.com/DustinYochim"><img src="img/GitHub-Mark-64px.png" alt="GitHub Logo & Link"></a>
    </div>
    
<script src="main.js"></script>
</body>
</html>
